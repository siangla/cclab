<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="隨機亂數">
<meta name="theme-color" content="#a8c17c">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<title>隨機亂數</title>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">工具 · Tool</div>
  <div class="header-title">隨機<span>亂數</span></div>
</div>

<div class="card">
  <div class="tabs-all">
    <button class="tab active" onclick="switchTab('numbers')">連續數字</button>
    <button class="tab" onclick="switchTab('strings')">貼上字串</button>
    <button class="tab" onclick="switchTab('rps')">剪刀石頭布</button>
    <button class="tab" onclick="switchTab('wheel')">轉盤</button>
    <button class="tab" onclick="switchTab('ladder')">爬樓梯</button>
    <button class="tab" onclick="switchTab('split')">分攤帳單</button>
  </div>

  <!-- 連續數字 -->
  <div class="panel active" id="panel-numbers">
    <div class="field-group">
      <div class="fg-label">數字範圍</div>
      <div class="input-row">
        <span class="lbl">從</span>
        <input type="number" id="numFrom" placeholder="0" inputmode="numeric">
        <span class="lbl">到</span>
        <input type="number" id="numTo" placeholder="100" inputmode="numeric">
      </div>
      <div class="count-row">
        <span class="lbl">選取</span>
        <input type="number" id="numCount" placeholder="5" min="1" inputmode="numeric">
        <span class="lbl">個數字</span>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">允許重複抽取</span>
        <label class="toggle"><input type="checkbox" id="numRepeat"><span class="toggle-track"></span></label>
      </div>
    </div>
    <button class="btn-gen" onclick="generateNumbers()">隨機產生</button>
    <div class="result-wrap" id="num-result-wrap">
      <div class="result-header">
        <span class="result-label">抽取結果</span>
        <button class="btn-copy" onclick="copyResult('num')">複製</button>
      </div>
      <div class="result-area" id="num-result"></div>
    </div>
    <div class="history-wrap" id="num-history-wrap">
      <div class="history-label">最近記錄</div>
      <div class="history-list" id="num-history-list"></div>
    </div>
  </div>

  <!-- 貼上字串 -->
  <div class="panel" id="panel-strings">
    <textarea id="strInput" placeholder="每個字串以換行分隔&#10;例如：&#10;小明&#10;小華&#10;小美" oninput="updateStrCounter()"></textarea>
    <div class="str-counter">共 <span id="str-count">0</span> 項</div>
    <div class="str-bottom">
      <span class="lbl">選取</span>
      <input type="number" id="strCount" placeholder="2" min="1" inputmode="numeric">
      <span class="lbl">個字串</span>
    </div>
    <button class="btn-gen" onclick="generateStrings()">隨機產生</button>
    <div class="result-wrap" id="str-result-wrap">
      <div class="result-header">
        <span class="result-label">抽取結果</span>
        <button class="btn-copy" onclick="copyResult('str')">複製</button>
      </div>
      <div class="result-area" id="str-result"></div>
    </div>
    <div class="history-wrap" id="str-history-wrap">
      <div class="history-label">最近記錄</div>
      <div class="history-list" id="str-history-list"></div>
    </div>
  </div>

  <!-- 剪刀石頭布 -->
  <div class="panel" id="panel-rps">
    <div class="rps-score">
      <div class="score-cell win-cell"><div class="score-val" id="score-win">0</div><div class="score-key">勝</div></div>
      <div class="score-cell draw-cell"><div class="score-val" id="score-draw">0</div><div class="score-key">平</div></div>
      <div class="score-cell lose-cell"><div class="score-val" id="score-lose">0</div><div class="score-key">敗</div></div>
    </div>
    <p class="rps-subtitle">— 選擇你的出拳 —</p>
    <div class="rps-row">
      <div class="rps-item">
        <button class="rps-btn" id="rps-scissors" onclick="chooseRPS('scissors')">✌️</button>
        <span class="rps-lbl">剪刀</span>
      </div>
      <div class="rps-item">
        <button class="rps-btn" id="rps-rock" onclick="chooseRPS('rock')">✊</button>
        <span class="rps-lbl">石頭</span>
      </div>
      <div class="rps-item">
        <button class="rps-btn" id="rps-paper" onclick="chooseRPS('paper')">🖐️</button>
        <span class="rps-lbl">布</span>
      </div>
    </div>
    <div id="rps-result-area" class="rps-result"></div>
  </div>

  <!-- 轉盤 -->
  <div class="panel" id="panel-wheel">
    <div class="wheel-input-area">
      <textarea id="wheelInput" style="min-height:90px;" placeholder="每行輸入一個選項&#10;例如：&#10;吃飯&#10;看電影&#10;打電動" oninput="drawWheel()"></textarea>
    </div>
    <div class="wheel-wrap">
      <div class="wheel-container">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" width="300" height="300"></canvas>
        <div class="wheel-center"></div>
      </div>
      <div class="wheel-result-box" id="wheel-result-box"></div>
    </div>
    <button class="btn-gen" id="wheelBtn" onclick="spinWheel()">開始轉動</button>
  </div>

  <!-- 爬樓梯 -->
  <div class="panel" id="panel-ladder">
    <p class="ladder-hint">輸入選項後按「產生爬樓梯」，再從<strong>上方</strong>選擇要走哪條線，動畫結束後揭曉結果。</p>
    <textarea id="ladderPrizes" style="min-height:110px;" placeholder="每行輸入一個選項&#10;例如：&#10;洗碗&#10;倒垃圾&#10;掃地&#10;買飲料" oninput="updateLadderCounter()"></textarea>
    <div class="str-counter" style="margin-bottom:4px;">共 <span id="ladder-prize-count">0</span> 個選項</div>
    <button class="btn-gen" onclick="generateLadder()">產生爬樓梯</button>

    <!-- pick buttons -->
    <div id="ladder-canvas-wrap" class="ladder-canvas-wrap" style="display:none;">
      <div class="ladder-pick-row" id="ladder-pick-row"></div>
      <canvas id="ladderCanvas"></canvas>
    </div>
    <div id="ladder-result-reveal" class="ladder-result-reveal"></div>
  </div>
</div>

  <!-- 分攤帳單 -->
  <div class="panel" id="panel-split">

    <!-- Step 1: 總金額 + 人數 -->
    <div class="field-group">
      <div class="fg-label">基本資訊</div>
      <div class="input-row">
        <span class="lbl">總金額</span>
        <input type="number" id="splitTotal" placeholder="例：1200" min="0" inputmode="decimal">
        <span class="lbl">元</span>
      </div>
      <div class="count-row">
        <span class="lbl">參與人數</span>
        <input type="number" id="splitPeople" placeholder="例：4" min="1" inputmode="numeric">
        <span class="lbl">人</span>
      </div>
    </div>

    <!-- Step 2: 三個功能按鈕 -->
    <div class="split-btn-group">
      <button class="split-func-btn" onclick="doEvenSplit()">
        <span class="sfb-icon">➗</span>
        <span class="sfb-label">平均分配</span>
        <span class="sfb-sub">每人付一樣</span>
      </button>
      <button class="split-func-btn" onclick="doItemSplit()">
        <span class="sfb-icon">🍽️</span>
        <span class="sfb-label">各自點餐</span>
        <span class="sfb-sub">填入各自金額</span>
      </button>
      <button class="split-func-btn" onclick="doHongbao()">
        <span class="sfb-icon">🧧</span>
        <span class="sfb-label">隨機分紅包</span>
        <span class="sfb-sub">好玩隨機分配</span>
      </button>
    </div>

    <!-- 各自點餐展開區 -->
    <div id="split-item-area" style="display:none;">
      <div class="service-row" style="margin-top:14px;">
        <span class="lbl">總金額含服務費</span>
        <label class="toggle">
          <input type="checkbox" id="serviceToggle" onchange="toggleService()">
          <span class="toggle-track"></span>
        </label>
        <input type="number" class="service-pct-input" id="servicePct" value="10" min="0" max="99" disabled>
        <span class="lbl">%</span>
      </div>
      <div class="person-list" id="person-list" style="margin-top:10px;"></div>
      <button class="btn-gen" style="margin-top:12px;" onclick="calcItemSplit()">計算分攤</button>
    </div>

    <!-- 結果區 -->
    <div id="split-result" class="split-result"></div>

  </div>


<!-- 安裝橫幅 -->
<div id="install-banner" style="display:none;">
  <div class="banner-text">將「隨機亂數」加入主畫面，離線也能用！</div>
  <div class="banner-btns">
    <button id="btn-install">安裝</button>
    <button id="btn-dismiss">略過</button>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
