<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LangLab — 每日英日單字</title>
<script src="words.js"></script>
<style>
:root{
  --bg:#f5f6fa; --card:#ffffff; --text:#1e2330; --sub:#6b7280; --line:#e5e7eb;
  --accent:#4f6ef7; --accent2:#eef1fe; --ok:#16a34a; --okbg:#e8f7ee; --no:#dc2626; --nobg:#fdeaea;
  --jp:#e0592a; --en:#2a6fe0; --shadow:0 1px 4px rgba(0,0,0,.07);
}
[data-theme=dark]{
  --bg:#14161e; --card:#1e2230; --text:#e8eaf2; --sub:#9aa1b5; --line:#2e3345;
  --accent:#7b93ff; --accent2:#262c44; --ok:#4ade80; --okbg:#173324; --no:#f87171; --nobg:#3a1d1d;
  --shadow:0 1px 4px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Noto Sans TC","Noto Sans JP",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:16px 14px 90px}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 16px}
header h1{font-size:22px}
header h1 span{color:var(--accent)}
#themeBtn{background:none;border:1px solid var(--line);border-radius:20px;padding:5px 12px;color:var(--text);cursor:pointer}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:20}
nav button{flex:1;padding:12px 0 14px;background:none;border:none;color:var(--sub);font-size:13px;cursor:pointer}
nav button .ico{display:block;font-size:20px;margin-bottom:2px}
nav button.on{color:var(--accent);font-weight:700}
.langtab{display:flex;gap:8px;margin-bottom:14px}
.langtab button{flex:1;padding:10px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--sub);font-size:15px;cursor:pointer;font-weight:600}
.langtab button.on.jp{border-color:var(--jp);color:var(--jp);background:var(--card)}
.langtab button.on.en{border-color:var(--en);color:var(--en)}
.bar{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;font-size:14px}
.bar b{color:var(--accent)}
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid transparent}
.card.newword{border-left-color:var(--accent)}
.card.review{border-left-color:#f59e0b}
.card .tag{font-size:11px;color:var(--sub);background:var(--bg);border-radius:8px;padding:2px 8px;margin-left:6px;vertical-align:middle}
.card .w{font-size:24px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card .romaji{color:var(--accent);font-size:14px;margin-top:2px}
.card .meaning{font-size:16px;margin-top:6px}
.card .sent{margin-top:10px;padding:10px 12px;background:var(--bg);border-radius:10px;font-size:15px;line-height:1.6}
.card .sent .sr{color:var(--accent);font-size:13px}
.card .sent .sz{color:var(--sub);font-size:14px}
.spk{background:var(--accent2);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;color:var(--accent)}
.btns{display:flex;gap:10px;margin-top:12px}
.btns button{flex:1;padding:10px;border-radius:10px;border:none;font-size:15px;cursor:pointer;font-weight:600}
.btn-ok{background:var(--okbg);color:var(--ok)}
.btn-no{background:var(--nobg);color:var(--no)}
.btns button.picked{outline:2px solid currentColor}
.done-tip{margin-top:12px;font-size:14px;color:var(--sub);text-align:center}
.empty{padding:40px 10px;text-align:center;color:var(--sub);font-size:15px;line-height:1.8}
/* quiz */
.qcard{background:var(--card);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.qtype{font-size:12px;color:var(--sub);margin-bottom:8px}
.qword{font-size:26px;font-weight:700;margin-bottom:4px}
.qhint{color:var(--sub);font-size:14px;margin-bottom:14px}
.opts{display:grid;gap:10px}
.opts button{padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:16px;cursor:pointer;text-align:left}
.opts button.right{border-color:var(--ok);background:var(--okbg);color:var(--ok)}
.opts button.wrong{border-color:var(--no);background:var(--nobg);color:var(--no)}
#spellIn{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:17px;margin-bottom:10px}
.pbtn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:16px;cursor:pointer;font-weight:600;margin-top:12px}
.pbtn.ghost{background:var(--accent2);color:var(--accent)}
.qfb{margin-top:12px;font-size:15px;line-height:1.7}
.qfb.good{color:var(--ok)} .qfb.bad{color:var(--no)}
/* stats */
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--card);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
.stat .n{font-size:26px;font-weight:700;color:var(--accent)}
.stat .l{font-size:13px;color:var(--sub);margin-top:2px}
.chart{background:var(--card);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.chart h3{font-size:14px;margin-bottom:12px;color:var(--sub)}
.bars{display:flex;align-items:flex-end;gap:2px;height:110px}
.bars .b{flex:1;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;opacity:.85}
.bars .b.zero{background:var(--line)}
.chart .axis{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-top:6px}
/* settings */
.set{background:var(--card);border-radius:12px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.set h3{font-size:15px;margin-bottom:10px}
.set label{display:block;font-size:13px;color:var(--sub);margin:10px 0 4px}
.set input,.set select,.set textarea{width:100%;padding:9px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:14px}
.set textarea{height:90px;font-family:monospace}
.row2{display:flex;gap:10px}
.row2>*{flex:1}
.msg{font-size:13px;margin-top:8px;color:var(--ok)}
.msg.err{color:var(--no)}
.view{display:none}
.view.on{display:block}
@media(min-width:700px){ .cards2{display:grid;grid-template-columns:1fr 1fr;gap:12px} .cards2 .card{margin-bottom:0} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Lang<span>Lab</span> <small style="font-size:12px;color:var(--sub);font-weight:400">每日英日單字</small></h1>
    <button id="themeBtn">🌙</button>
  </header>

  <div class="langtab" id="langTab">
    <button data-lang="en" class="en">🇺🇸 英文</button>
    <button data-lang="jp" class="jp">🇯🇵 日文</button>
  </div>

  <div id="view-today" class="view">
    <div class="bar"><span id="todayInfo"></span><span id="todayProg"></span></div>
    <div id="cardList" class="cards2"></div>
  </div>

  <div id="view-quiz" class="view"><div id="quizBox"></div></div>
  <div id="view-stats" class="view"><div id="statsBox"></div></div>
  <div id="view-set" class="view"><div id="setBox"></div></div>
</div>

<nav id="mainNav">
  <button data-v="today" class="on"><span class="ico">📖</span>今日學習</button>
  <button data-v="quiz"><span class="ico">✏️</span>測驗</button>
  <button data-v="stats"><span class="ico">📊</span>統計</button>
  <button data-v="set"><span class="ico">⚙️</span>設定</button>
</nav>

<script>
// ===== 工具 =====
const $=s=>document.querySelector(s);
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const addDays=(ds,n)=>{const d=new Date(ds+"T00:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const LS={get(k,d){try{const v=localStorage.getItem("langlab."+k);return v?JSON.parse(v):d;}catch(e){return d;}},set(k,v){localStorage.setItem("langlab."+k,JSON.stringify(v));}};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ===== 狀態 =====
let settings=LS.get("settings",{daily:10,rate:1,theme:"light"});
let progress=LS.get("progress",{});   // id -> {iv,streak,due,state} state: learn|master
let daily=LS.get("daily",{});         // {date, jp:{ids:[],marks:{}}, en:{...}}
let stats=LS.get("stats",{log:{}});   // log: date -> count
let custom=LS.get("custom",{jp:[],en:[]});
let lang=LS.get("lang","en");
const INTERVALS=[1,3,7,14,30], MASTER_STREAK=3;

// ===== 字庫 =====
function buildWords(){
  const jp=WORDS_JP.map((w,i)=>({id:"jp-"+i,word:w[0],romaji:w[1],meaning:w[2],sentence:w[3],sRomaji:w[4],sZh:w[5],level:w[6]}))
    .concat(custom.jp.map((w,i)=>({id:"cjp-"+i,word:w.word,romaji:w.romaji||"",meaning:w.meaning,sentence:w.sentence||"",sRomaji:w.sentenceRomaji||"",sZh:w.sentenceZh||"",level:w.level||"custom"})));
  const en=WORDS_EN.map((w,i)=>({id:"en-"+i,word:w[0],phonetic:w[1],meaning:w[2],sentence:w[3],sZh:w[4],level:w[5]}))
    .concat(custom.en.map((w,i)=>({id:"cen-"+i,word:w.word,phonetic:w.phonetic||"",meaning:w.meaning,sentence:w.sentence||"",sZh:w.sentenceZh||"",level:w.level||"custom"})));
  return {jp,en};
}
let WORDS=buildWords();
const byId=id=>WORDS.jp.concat(WORDS.en).find(w=>w.id===id);

// ===== SRS =====
function rec(id){return progress[id]||null;}
function mark(id,familiar){
  const t=todayStr();
  let r=progress[id]||{iv:0,streak:0,due:null,state:"learn"};
  if(familiar){
    r.streak++;
    if(r.streak>=MASTER_STREAK){r.state="master";r.due=null;}
    else{r.iv=Math.min(r.iv+1,INTERVALS.length-1);r.due=addDays(t,INTERVALS[Math.min(r.iv,INTERVALS.length-1)]);r.state="learn";}
  }else{
    r.streak=0;r.iv=0;r.due=addDays(t,1);r.state="learn";
  }
  progress[id]=r;LS.set("progress",progress);
  stats.log[t]=(stats.log[t]||0)+1;LS.set("stats",stats);
}

// ===== 每日選字 =====
function ensureDaily(){
  const t=todayStr();
  if(daily.date!==t){daily={date:t,jp:null,en:null};}
  ["jp","en"].forEach(L=>{
    if(daily[L])return;
    const words=WORDS[L];
    const reviews=words.filter(w=>{const r=rec(w.id);return r&&r.state==="learn"&&r.due&&r.due<=t;})
      .sort((a,b)=>rec(a.id).due<rec(b.id).due?-1:1);
    const news=words.filter(w=>!rec(w.id));
    const n=settings.daily;
    const ids=reviews.slice(0,n).map(w=>w.id);
    for(const w of news){if(ids.length>=n)break;ids.push(w.id);}
    daily[L]={ids,marks:{}};
  });
  LS.set("daily",daily);
}

// ===== TTS =====
function speak(text,L){
  if(!("speechSynthesis"in window)){alert("此瀏覽器不支援語音");return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=L==="jp"?"ja-JP":"en-US";
  u.rate=settings.rate;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith(L==="jp"?"ja":"en"));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
if("speechSynthesis"in window)speechSynthesis.getVoices();

// ===== 今日學習畫面 =====
function renderToday(){
  ensureDaily();
  const d=daily[lang],words=d.ids.map(byId).filter(Boolean);
  const marked=Object.keys(d.marks).length;
  const t=todayStr();
  const dueCount=WORDS[lang].filter(w=>{const r=rec(w.id);return r&&r.state==="learn"&&r.due&&r.due<=t;}).length;
  $("#todayInfo").innerHTML=`📅 ${t}　待複習 <b>${dueCount}</b>`;
  $("#todayProg").innerHTML=`已標記 <b>${marked}</b> / ${words.length}`;
  const box=$("#cardList");
  if(!words.length){box.innerHTML=`<div class="empty">🎉 字庫的單字都學完了！<br>可到「設定」匯入或新增單字繼續學習。</div>`;return;}
  box.innerHTML=words.map(w=>{
    const r=rec(w.id),isNew=!r||(r.streak===0&&r.iv===0&&!d.marks[w.id]&&!r.due)||!r;
    const wasReview=r&&r.due&&r.due<=t&&!d.marks[w.id];
    const m=d.marks[w.id];
    const romajiLine=lang==="jp"?`<div class="romaji">${esc(w.romaji)}</div>`:(w.phonetic?`<div class="romaji">${esc(w.phonetic)}</div>`:"");
    const sr=lang==="jp"&&w.sRomaji?`<div class="sr">${esc(w.sRomaji)}</div>`:"";
    return `<div class="card ${wasReview?"review":"newword"}">
      <div class="w">${esc(w.word)}
        <button class="spk" onclick="speak(${JSON.stringify(w.word).replace(/"/g,"&quot;")},'${lang}')">🔊</button>
        <span class="tag">${esc(w.level)}${wasReview?"・複習":""}</span></div>
      ${romajiLine}
      <div class="meaning">${esc(w.meaning)}</div>
      ${w.sentence?`<div class="sent">${esc(w.sentence)}
        <button class="spk" style="width:24px;height:24px;font-size:11px" onclick="speak(${JSON.stringify(w.sentence).replace(/"/g,"&quot;")},'${lang}')">🔊</button>
        ${sr}<div class="sz">${esc(w.sZh)}</div></div>`:""}
      <div class="btns">
        <button class="btn-ok ${m==="fam"?"picked":""}" onclick="markCard('${w.id}','fam')">✓ 熟悉</button>
        <button class="btn-no ${m==="unf"?"picked":""}" onclick="markCard('${w.id}','unf')">✗ 不熟悉</button>
      </div>
      ${m?`<div class="done-tip">${m==="fam"?"已標記熟悉":"已標記不熟悉，明天會再出現"}</div>`:""}
    </div>`;
  }).join("");
}
function markCard(id,how){
  const d=daily[lang];
  if(d.marks[id])return; // 一天標一次
  d.marks[id]=how;LS.set("daily",daily);
  mark(id,how==="fam");
  renderToday();
}
// ===== 測驗 =====
let quiz=null;
function quizPool(){
  const t=todayStr();
  const learn=WORDS[lang].filter(w=>{const r=rec(w.id);return r&&r.state==="learn";});
  // 不熟悉（streak 0）的加倍權重
  const pool=[];
  learn.forEach(w=>{pool.push(w);if(rec(w.id).streak===0)pool.push(w);});
  return {pool,learn};
}
function startQuiz(){
  const {pool,learn}=quizPool();
  if(learn.length<4){
    $("#quizBox").innerHTML=`<div class="empty">至少要有 4 個「學習中」的單字才能測驗。<br>先到「今日學習」標記幾個單字吧！</div>`;
    return;
  }
  const qs=[];const used=new Set();
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  for(const w of shuffled){
    if(used.has(w.id))continue;used.add(w.id);
    const types=["w2m","m2w","spell"];
    qs.push({w,type:types[Math.floor(Math.random()*3)]});
    if(qs.length>=Math.min(10,learn.length))break;
  }
  quiz={qs,i:0,score:0};
  renderQuiz();
}
function choiceSet(w,field){
  const others=WORDS[lang].filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3);
  return [...others,w].sort(()=>Math.random()-.5).map(x=>({id:x.id,text:x[field]}));
}
const normAns=s=>s.toLowerCase().replace(/[\s。．.･・'’-]/g,"");
function renderQuiz(){
  if(!quiz){$("#quizBox").innerHTML=`<div class="qcard" style="text-align:center">
    <div style="font-size:40px;margin-bottom:10px">✏️</div>
    <p style="color:var(--sub);margin-bottom:6px">從「學習中」的單字出 10 題，答對計入熟悉進度。</p>
    <button class="pbtn" onclick="startQuiz()">開始測驗</button></div>`;return;}
  const {qs,i}=quiz;
  if(i>=qs.length){
    $("#quizBox").innerHTML=`<div class="qcard" style="text-align:center">
      <div style="font-size:40px;margin-bottom:8px">${quiz.score>=qs.length*0.8?"🏆":"💪"}</div>
      <div style="font-size:22px;font-weight:700">${quiz.score} / ${qs.length}</div>
      <p style="color:var(--sub);margin-top:6px">答對已計入熟悉進度，答錯的會重新排入複習。</p>
      <button class="pbtn" onclick="startQuiz()">再測一回</button>
      <button class="pbtn ghost" onclick="quiz=null;renderQuiz()">回測驗首頁</button></div>`;
    return;
  }
  const q=qs[i],w=q.w;
  let inner=`<div class="qtype">第 ${i+1} / ${qs.length} 題</div>`;
  if(q.type==="w2m"){
    inner+=`<div class="qword">${esc(w.word)} <button class="spk" onclick="speak(${JSON.stringify(w.word).replace(/"/g,"&quot;")},'${lang}')">🔊</button></div>
      ${lang==="jp"?`<div class="qhint">${esc(w.romaji)}</div>`:""}
      <div class="qhint">選出正確的意思</div>
      <div class="opts">${choiceSet(w,"meaning").map(o=>`<button onclick="answer('${o.id}','${w.id}',this)">${esc(o.text)}</button>`).join("")}</div>`;
  }else if(q.type==="m2w"){
    inner+=`<div class="qword">${esc(w.meaning)}</div><div class="qhint">選出對應的${lang==="jp"?"日文":"英文"}單字</div>
      <div class="opts">${choiceSet(w,"word").map(o=>`<button onclick="answer('${o.id}','${w.id}',this)">${esc(o.text)}</button>`).join("")}</div>`;
  }else{
    inner+=`<div class="qword">${esc(w.meaning)}</div>
      <div class="qhint">${lang==="jp"?"輸入日文（原文或羅馬拼音皆可）":"拼出英文單字"}</div>
      <input id="spellIn" autocomplete="off" onkeydown="if(event.key==='Enter')spellCheck('${w.id}')">
      <button class="pbtn" onclick="spellCheck('${w.id}')">確認</button>`;
  }
  inner+=`<div class="qfb" id="qfb"></div>`;
  $("#quizBox").innerHTML=`<div class="qcard">${inner}</div>`;
  const sp=$("#spellIn");if(sp)sp.focus();
}
function finishQ(correct,w){
  const fb=$("#qfb");
  fb.className="qfb "+(correct?"good":"bad");
  fb.innerHTML=(correct?"✓ 答對了！":"✗ 答錯了。正確答案：<b>"+esc(w.word)+"</b>"+(lang==="jp"?"（"+esc(w.romaji)+"）":""))+
    "<br><span style='color:var(--sub)'>"+esc(w.word)+"　"+esc(w.meaning)+"</span>"+
    `<button class="pbtn" style="margin-top:10px" onclick="quiz.i++;renderQuiz()">下一題 →</button>`;
  if(correct)quiz.score++;
  mark(w.id,correct);
}
function answer(pick,right,btn){
  if($("#qfb").innerHTML)return;
  const w=byId(right);
  const correct=pick===right;
  btn.classList.add(correct?"right":"wrong");
  if(!correct){[...btn.parentNode.children].forEach(b=>{if(b.onclick&&b.getAttribute("onclick").includes("'"+right+"'")&&b.getAttribute("onclick").startsWith("answer('"+right))b.classList.add("right");});}
  document.querySelectorAll(".opts button").forEach(b=>b.style.pointerEvents="none");
  finishQ(correct,w);
}
function spellCheck(id){
  if($("#qfb").innerHTML)return;
  const w=byId(id);
  const val=normAns($("#spellIn").value||"");
  if(!val)return;
  const ok=val===normAns(w.word)||(lang==="jp"&&w.romaji&&val===normAns(w.romaji));
  finishQ(ok,w);
}

// ===== 統計 =====
function calcStreak(){
  let s=0,d=todayStr();
  if(!stats.log[d])d=addDays(d,-1);
  while(stats.log[d]){s++;d=addDays(d,-1);}
  return s;
}
function renderStats(){
  const t=todayStr();
  const counts=L=>{
    let m=0,l=0;
    WORDS[L].forEach(w=>{const r=rec(w.id);if(!r)return;r.state==="master"?m++:l++;});
    return {m,l,n:WORDS[L].length-m-l};
  };
  const en=counts("en"),jp=counts("jp");
  const due=L=>WORDS[L].filter(w=>{const r=rec(w.id);return r&&r.state==="learn"&&r.due&&r.due<=t;}).length;
  let bars="",max=1;const days=[];
  for(let i=29;i>=0;i--){const d=addDays(t,-i);const c=stats.log[d]||0;days.push(c);if(c>max)max=c;}
  bars=days.map(c=>`<div class="b ${c?"":"zero"}" style="height:${Math.max(2,c/max*100)}%" title="${c}"></div>`).join("");
  $("#statsBox").innerHTML=`
    <div class="statgrid">
      <div class="stat"><div class="n">🔥 ${calcStreak()}</div><div class="l">連續學習天數</div></div>
      <div class="stat"><div class="n">${stats.log[t]||0}</div><div class="l">今日已學習（次）</div></div>
      <div class="stat"><div class="n">${due("en")+due("jp")}</div><div class="l">今日待複習</div></div>
    </div>
    <div class="statgrid">
      <div class="stat"><div class="n" style="color:var(--en)">${en.m}</div><div class="l">英文已精通（學習中 ${en.l}・未學 ${en.n}）</div></div>
      <div class="stat"><div class="n" style="color:var(--jp)">${jp.m}</div><div class="l">日文已精通（學習中 ${jp.l}・未學 ${jp.n}）</div></div>
    </div>
    <div class="chart"><h3>近 30 天學習量</h3><div class="bars">${bars}</div>
      <div class="axis"><span>${addDays(t,-29)}</span><span>${t}</span></div></div>`;
}
// ===== 設定 =====
function renderSet(){
  $("#setBox").innerHTML=`
  <div class="set"><h3>學習設定</h3>
    <div class="row2">
      <div><label>每日單字數（每語言）</label>
        <select id="setDaily">${[5,8,10,15,20].map(n=>`<option ${settings.daily===n?"selected":""}>${n}</option>`).join("")}</select></div>
      <div><label>發音語速</label>
        <select id="setRate"><option value="0.7" ${settings.rate==0.7?"selected":""}>慢 (0.7x)</option><option value="1" ${settings.rate==1?"selected":""}>正常 (1x)</option></select></div>
    </div>
    <button class="pbtn" onclick="saveSet()">儲存設定</button><div class="msg" id="setMsg"></div>
  </div>
  <div class="set"><h3>新增單字</h3>
    <div class="row2">
      <div><label>語言</label><select id="awLang"><option value="en">英文</option><option value="jp">日文</option></select></div>
      <div><label>單字</label><input id="awWord"></div>
    </div>
    <div class="row2">
      <div><label>羅馬拼音／音標（日文必填）</label><input id="awRomaji"></div>
      <div><label>中文意思</label><input id="awMeaning"></div>
    </div>
    <label>例句（選填）</label><input id="awSent">
    <div class="row2">
      <div><label>例句羅馬拼音（日文）</label><input id="awSentR"></div>
      <div><label>例句中譯</label><input id="awSentZh"></div>
    </div>
    <button class="pbtn" onclick="addWord()">新增</button><div class="msg" id="awMsg"></div>
  </div>
  <div class="set"><h3>匯入單字（JSON）</h3>
    <label>格式：{"lang":"jp","words":[{"word":"...","romaji":"...","meaning":"...","sentence":"...","sentenceRomaji":"...","sentenceZh":"..."}]}</label>
    <textarea id="impWords" placeholder='貼上 JSON 後按匯入'></textarea>
    <button class="pbtn" onclick="importWords()">匯入單字</button><div class="msg" id="impWMsg"></div>
  </div>
  <div class="set"><h3>備份與還原</h3>
    <div class="row2">
      <button class="pbtn ghost" onclick="exportAll()">匯出進度備份</button>
      <button class="pbtn ghost" onclick="$('#impFile').click()">匯入進度備份</button>
    </div>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="importAll(this)">
    <div class="msg" id="bakMsg"></div>
  </div>
  <div class="set"><h3>字庫資訊</h3>
    <label>內建：英文 ${WORDS_EN.length} 字・日文 ${WORDS_JP.length} 字｜自訂：英文 ${custom.en.length} 字・日文 ${custom.jp.length} 字</label>
    <label style="margin-top:6px">也可直接編輯資料夾中的 words.js 擴充字庫（格式見 README）。</label>
  </div>`;
}
function saveSet(){
  settings.daily=parseInt($("#setDaily").value);
  settings.rate=parseFloat($("#setRate").value);
  LS.set("settings",settings);
  $("#setMsg").textContent="已儲存 ✓（每日字數自明日生效）";
}
function addWord(){
  const L=$("#awLang").value,msg=$("#awMsg");
  const w={word:$("#awWord").value.trim(),meaning:$("#awMeaning").value.trim(),
    sentence:$("#awSent").value.trim(),sentenceZh:$("#awSentZh").value.trim()};
  if(L==="jp"){w.romaji=$("#awRomaji").value.trim();w.sentenceRomaji=$("#awSentR").value.trim();}
  else w.phonetic=$("#awRomaji").value.trim();
  if(!w.word||!w.meaning||(L==="jp"&&!w.romaji)){msg.className="msg err";msg.textContent="請填單字、意思（日文需羅馬拼音）";return;}
  custom[L].push(w);LS.set("custom",custom);WORDS=buildWords();
  msg.className="msg";msg.textContent=`已新增「${w.word}」✓`;
  ["awWord","awRomaji","awMeaning","awSent","awSentR","awSentZh"].forEach(i=>$("#"+i).value="");
}
function importWords(){
  const msg=$("#impWMsg");
  try{
    const j=JSON.parse($("#impWords").value);
    if(!j.lang||!["jp","en"].includes(j.lang)||!Array.isArray(j.words))throw 0;
    let n=0;
    j.words.forEach(w=>{if(w.word&&w.meaning){custom[j.lang].push(w);n++;}});
    LS.set("custom",custom);WORDS=buildWords();
    msg.className="msg";msg.textContent=`成功匯入 ${n} 個單字 ✓`;$("#impWords").value="";renderSet();
  }catch(e){msg.className="msg err";msg.textContent="JSON 格式錯誤，請確認後再試";}
}
function exportAll(){
  const data={settings,progress,daily,stats,custom,exportedAt:new Date().toISOString()};
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,1)],{type:"application/json"}));
  a.download="langlab-backup-"+todayStr()+".json";a.click();
  $("#bakMsg").textContent="已下載備份檔 ✓";
}
function importAll(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);
    if(d.progress)progress=d.progress;if(d.stats)stats=d.stats;if(d.custom)custom=d.custom;
    if(d.settings)settings=d.settings;if(d.daily)daily=d.daily;
    ["progress","stats","custom","settings","daily"].forEach(k=>LS.set(k,eval(k)));
    WORDS=buildWords();
    $("#bakMsg").textContent="還原成功 ✓";render();
  }catch(e){$("#bakMsg").className="msg err";$("#bakMsg").textContent="備份檔格式錯誤";}};
  r.readAsText(f);
}

// ===== 導覽與初始化 =====
let view="today";
function render(){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
  $("#view-"+view).classList.add("on");
  document.querySelectorAll("#mainNav button").forEach(b=>b.classList.toggle("on",b.dataset.v===view));
  document.querySelectorAll("#langTab button").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
  $("#langTab").style.display=(view==="today"||view==="quiz")?"flex":"none";
  if(view==="today")renderToday();
  else if(view==="quiz")renderQuiz();
  else if(view==="stats")renderStats();
  else renderSet();
}
$("#mainNav").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;view=b.dataset.v;if(view==="quiz")quiz=null;render();});
$("#langTab").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;lang=b.dataset.lang;LS.set("lang",lang);quiz=null;render();});
function applyTheme(){document.documentElement.dataset.theme=settings.theme;$("#themeBtn").textContent=settings.theme==="dark"?"☀️":"🌙";}
$("#themeBtn").onclick=()=>{settings.theme=settings.theme==="dark"?"light":"dark";LS.set("settings",settings);applyTheme();};
applyTheme();
render();
</script>
</body>
</html>
