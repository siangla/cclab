<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月度預算追蹤器</title>
  <link rel="stylesheet" href="style.css">
  <!-- SheetJS for Excel import/export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- ── Toast container ─────────────────────── -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ── Header ──────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="logo">
      預算<span>追蹤</span>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)" aria-label="上一個月">&#8592;</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="changeMonth(1)" aria-label="下一個月">&#8594;</button>
    </div>
  </div>
</header>

<!-- ── Main ────────────────────────────────── -->
<main>

  <!-- Alerts -->
  <div class="alerts" id="alerts"></div>

  <!-- Summary strip -->
  <div class="summary-strip" id="summaryStrip"></div>

  <!-- ── Left column ──────────────────────── -->
  <div class="left-col">
    <div class="card">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('overview', this)">
          <span class="tab-icon">◎</span>總覽
        </button>
        <button class="tab" onclick="switchTab('budget', this)">
          <span class="tab-icon">◈</span>預算設定
        </button>
        <button class="tab" onclick="switchTab('history', this)">
          <span class="tab-icon">☰</span>支出明細
        </button>
      </div>

      <!-- Panel: Overview -->
      <div id="tab-overview" class="panel active">
        <div class="chart-layout">
          <div class="chart-wrap">
            <canvas id="pieChart" role="img" aria-label="各類別支出圓餅圖"></canvas>
          </div>
          <div class="legend" id="pieLegend"></div>
        </div>
        <div class="cat-list" id="catProgress"></div>
      </div>

      <!-- Panel: Budget settings -->
      <div id="tab-budget" class="panel">
        <div class="budget-grid" id="budgetForm"></div>
        <div class="budget-total-bar">
          <span class="budget-total-label">預算合計</span>
          <span class="budget-total-value" id="budgetTotal">NT$0</span>
        </div>
        <div class="budget-save-bar">
          <button class="btn-primary" onclick="saveBudgets()">💾 儲存預算設定</button>
        </div>
      </div>

      <!-- Panel: History -->
      <div id="tab-history" class="panel">
        <div class="history-toolbar">
          <span class="history-info" id="historyInfo"></span>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn-secondary" onclick="exportExcel()">📥 匯出 Excel</button>
            <label class="btn-secondary" style="cursor:pointer">
              📤 匯入 Excel
              <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none" onchange="importExcel(event)">
            </label>
            <button class="btn-sm btn-danger" onclick="clearMonth()">清除本月</button>
          </div>
        </div>
        <div class="exp-list" id="expenseList"></div>
      </div>

    </div>
  </div>

  <!-- ── Right column ──────────────────────── -->
  <div class="right-col">

    <!-- Quick add -->
    <div class="card quick-add">
      <div class="card-header">
        <div>
          <div class="card-title">記帳</div>
          <div class="card-subtitle" style="color:#6b7280">新增一筆支出</div>
        </div>
      </div>
      <div class="form-body">
        <div class="form-row">
          <label for="expCat">類別</label>
          <select id="expCat"></select>
        </div>
        <div class="form-row">
          <label for="expDesc">描述</label>
          <input type="text" id="expDesc" placeholder="e.g. 午餐、計程車費">
        </div>
        <div class="form-row">
          <label for="expAmt">金額 (NT$)</label>
          <input type="number" id="expAmt" min="1" placeholder="0">
        </div>
        <div class="form-row">
          <label for="expDate">日期</label>
          <input type="date" id="expDate">
        </div>
        <button class="btn-primary" onclick="addExpense()">＋ 新增支出</button>
      </div>
    </div>

    <!-- Firebase sync -->
    <div class="firebase-card">
      <div class="firebase-header">
        <svg class="firebase-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 37L13.17 8.83a.5.5 0 01.93-.12L19 18l2.5-4.69a.5.5 0 01.89.01L40 37H8z" fill="#FF8F00"/>
          <path d="M8 37l13-12.5 6 6L8 37z" fill="#FF6F00" opacity=".7"/>
          <path d="M27 18.5L40 37 21.4 13.31a.5.5 0 00-.9.01L8 37l11.5-11L27 18.5z" fill="#FFC400"/>
        </svg>
        <div>
          <div class="firebase-title">Firebase 雲端同步</div>
          <div class="firebase-subtitle">離線優先・手動同步模式</div>
        </div>
      </div>
      <div class="firebase-body">

        <div class="firebase-status" id="fbStatus">
          <div class="status-dot" id="fbDot"></div>
          <span class="status-text" id="fbStatusText">尚未設定 Firebase</span>
          <span class="status-time" id="fbLastSync"></span>
        </div>

        <div class="firebase-config">
          <div class="config-row">
            <div class="config-label">API Key</div>
            <input class="config-input" id="fbApiKey" type="password" placeholder="AIzaSy…" autocomplete="off">
          </div>
          <div class="config-row">
            <div class="config-label">Database URL</div>
            <input class="config-input" id="fbDbUrl" placeholder="https://xxx.firebaseio.com" autocomplete="off">
          </div>
          <div class="config-row">
            <div class="config-label">共用節點路徑</div>
            <input class="config-input" id="fbPath" placeholder="budget-tracker" value="budget-tracker">
          </div>
          <button class="btn-secondary" style="width:100%;justify-content:center" onclick="fbConnect()">🔌 儲存並連線</button>
        </div>

        <div class="firebase-btn-row">
          <button class="btn-firebase-pull" id="btnPull" onclick="fbPull()" disabled>
            ⬇ 拉取資料
          </button>
          <button class="btn-firebase-push" id="btnPush" onclick="fbPush()" disabled>
            ⬆ 推送資料
          </button>
        </div>

        <div style="font-size:0.72rem;color:var(--ink-3);line-height:1.5;padding:0 2px">
          💡 離線優先：平常在本機記帳，需要與他人共用時再手動拉取或推送。推送前請先拉取以避免資料衝突。
        </div>

      </div>
    </div>

  </div>
</main>

<!-- ── Footer ──────────────────────────────── -->
<footer>月度預算追蹤器 &mdash; 離線優先・資料儲存於本機瀏覽器 &mdash; 可選擇性連線 Firebase 與他人共用</footer>

<!-- ── JavaScript ──────────────────────────── -->
<script>
/* ═══════════════════════════════════════
   常數與設定
═══════════════════════════════════════ */
const CATS = [
  { id: 'food',      name: '餐飲', icon: '🍜', color: '#c8502a', bg: '#faeee9', text: '#7a2e10' },
  { id: 'transport', name: '交通', icon: '🚌', color: '#1a7a72', bg: '#d8f0ee', text: '#0e4f4a' },
  { id: 'housing',   name: '住房', icon: '🏠', color: '#6d3aa0', bg: '#ede4f7', text: '#3e1f6a' },
  { id: 'entertain', name: '娛樂', icon: '🎬', color: '#c47c0c', bg: '#fef3d6', text: '#7a4e0a' },
  { id: 'health',    name: '醫療', icon: '💊', color: '#2a7a4f', bg: '#dcf0e5', text: '#1a5533' },
  { id: 'shopping',  name: '購物', icon: '🛍️', color: '#c8502a', bg: '#faeee9', text: '#7a2e10' },
  { id: 'edu',       name: '教育', icon: '📚', color: '#1a7a72', bg: '#d8f0ee', text: '#0e4f4a' },
  { id: 'other',     name: '其他', icon: '📦', color: '#9a8f82', bg: '#ede9e1', text: '#52473a' },
];

// 預設預算：總計剛好 25000
const DEFAULT_BUDGETS = {
  food: 7000, transport: 3000, housing: 8000, entertain: 2000,
  health: 1500, shopping: 2000, edu: 1000, other: 500
};
// 驗證：7000+3000+8000+2000+1500+2000+1000+500 = 25000 ✓

let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let pieChart     = null;

/* ═══════════════════════════════════════
   Storage helpers
═══════════════════════════════════════ */
function monthKey(y, m) {
  return `${y}-${String(m + 1).padStart(2, '0')}`;
}
function load(k) {
  try { return JSON.parse(localStorage.getItem(k) || 'null'); } catch { return null; }
}
function save(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
}
function getExpenses(y, m) { return load('bgt_exp_' + monthKey(y, m)) || []; }
function setExpenses(y, m, arr) { save('bgt_exp_' + monthKey(y, m), arr); }
function getBudgets() { return load('bgt_budgets') || { ...DEFAULT_BUDGETS }; }
function catById(id) { return CATS.find(c => c.id === id) || CATS[CATS.length - 1]; }

/* ═══════════════════════════════════════
   Toast notifications
═══════════════════════════════════════ */
function toast(msg, type = 'success') {
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span>${icons[type] || '•'}</span><span>${msg}</span>`;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

/* ═══════════════════════════════════════
   Navigation
═══════════════════════════════════════ */
function changeMonth(d) {
  currentMonth += d;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderAll();
}

function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'budget') updateBudgetTotal();
}

/* ═══════════════════════════════════════
   Data helpers
═══════════════════════════════════════ */
function getTotals(expenses) {
  const t = {};
  CATS.forEach(c => t[c.id] = 0);
  expenses.forEach(e => { t[e.cat] = (t[e.cat] || 0) + e.amount; });
  return t;
}

function fmt(n) { return 'NT$' + Math.round(n).toLocaleString('zh-TW'); }

/* ═══════════════════════════════════════
   Main render
═══════════════════════════════════════ */
function renderAll() {
  const y = currentYear, m = currentMonth;
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').textContent = `${y}年 ${MONTHS[m]}`;

  const expenses    = getExpenses(y, m);
  const budgets     = getBudgets();
  const totals      = getTotals(expenses);
  const totalSpent  = Object.values(totals).reduce((a, b) => a + b, 0);
  const totalBudget = Object.values(budgets).reduce((a, b) => a + b, 0);
  const remaining   = totalBudget - totalSpent;
  const usedPct     = totalBudget > 0 ? Math.round(totalSpent / totalBudget * 100) : 0;

  renderSummary(totalBudget, totalSpent, remaining, usedPct);
  renderAlerts(totals, budgets);
  renderPieChart(totals, totalSpent);
  renderLegend(totals, totalSpent);
  renderCatProgress(totals, budgets);
  renderCatSelect();
  renderBudgetForm(budgets);
  renderExpenseList(expenses);
}

function renderSummary(totalBudget, totalSpent, remaining, usedPct) {
  const remClass = remaining < 0 ? 'danger' : remaining < totalBudget * 0.1 ? 'warning' : 'success';
  const barOk    = remaining < 0 ? '#c8502a' : remaining < totalBudget * 0.1 ? '#c47c0c' : '#2a7a4f';
  const cards = [
    { label: '總預算',   value: fmt(totalBudget),                       cls: '',       bar: '#6d3aa0' },
    { label: '已支出',   value: totalSpent > 0 ? fmt(totalSpent) : '—', cls: '',       bar: '#c8502a' },
    { label: '剩餘額度', value: fmt(remaining),                          cls: remClass, bar: barOk    },
    { label: '使用率',   value: usedPct + '%',                           cls: remClass, bar: barOk    },
  ];
  document.getElementById('summaryStrip').innerHTML = cards.map(c =>
    `<div class="metric-card" style="--bar-color:${c.bar}">
       <div class="metric-label">${c.label}</div>
       <div class="metric-value ${c.cls}">${c.value}</div>
     </div>`
  ).join('');
}

function renderAlerts(totals, budgets) {
  let html = '';
  CATS.forEach(c => {
    const spent  = totals[c.id] || 0;
    const budget = budgets[c.id] || 0;
    if (budget > 0 && spent > budget) {
      html += `<div class="alert alert-danger">
        <span class="alert-icon">⚠️</span>
        <strong>${c.name}</strong>&nbsp;已超支 ${fmt(spent - budget)}（預算 ${fmt(budget)}，已花 ${fmt(spent)}）
      </div>`;
    } else if (budget > 0 && spent > budget * 0.85) {
      html += `<div class="alert alert-warning">
        <span class="alert-icon">🔔</span>
        <strong>${c.name}</strong>&nbsp;即將用盡，已使用 ${Math.round(spent / budget * 100)}%（剩 ${fmt(budget - spent)}）
      </div>`;
    }
  });
  document.getElementById('alerts').innerHTML = html;
}

function renderPieChart(totals, totalSpent) {
  const pieData   = CATS.map(c => totals[c.id] || 0);
  const pieColors = CATS.map(c => c.color);
  if (pieChart) pieChart.destroy();
  const ctx = document.getElementById('pieChart').getContext('2d');
  if (totalSpent > 0) {
    pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: CATS.map(c => c.name),
        datasets: [{ data: pieData, backgroundColor: pieColors, borderWidth: 2, borderColor: '#fff', hoverBorderWidth: 2, hoverOffset: 4 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '64%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: {
            label: ctx => {
              const v = ctx.raw;
              if (!v) return null;
              const pct = totalSpent > 0 ? Math.round(v / totalSpent * 100) : 0;
              return ` ${fmt(v)} (${pct}%)`;
            }
          }}
        }
      }
    });
  } else {
    pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: { datasets: [{ data: [1], backgroundColor: ['#e5e7eb'], borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '64%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
    });
  }
}

function renderLegend(totals, totalSpent) {
  const activeCats = CATS.filter(c => (totals[c.id] || 0) > 0);
  const display    = activeCats.length ? activeCats : CATS.slice(0, 4);
  document.getElementById('pieLegend').innerHTML = display.map(c =>
    `<div class="legend-item">
       <div class="legend-dot" style="background:${c.color}"></div>
       <div class="legend-name">${c.name}</div>
       <div class="legend-amt">${totals[c.id] > 0 ? fmt(totals[c.id]) : '—'}</div>
       <div class="legend-pct">${totalSpent > 0 && totals[c.id] > 0 ? Math.round(totals[c.id] / totalSpent * 100) + '%' : ''}</div>
     </div>`
  ).join('');
}

function renderCatProgress(totals, budgets) {
  document.getElementById('catProgress').innerHTML = CATS.map(c => {
    const spent  = totals[c.id] || 0;
    const budget = budgets[c.id] || 1;
    const pct    = Math.min(100, Math.round(spent / budget * 100));
    const over   = spent > (budgets[c.id] || 0);
    return `<div class="cat-row">
      <div class="cat-icon" style="background:${c.bg}">${c.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
        <div class="cat-amounts">${fmt(spent)} / ${fmt(budgets[c.id] || 0)}</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" style="width:${pct}%;background:${over ? '#c8502a' : c.color}"></div>
      </div>
      <div class="cat-pct" style="color:${over ? '#c8502a' : c.color}">${pct}%</div>
    </div>`;
  }).join('');
}

function renderCatSelect() {
  const el = document.getElementById('expCat');
  if (el) el.innerHTML = CATS.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

function renderBudgetForm(budgets) {
  const el = document.getElementById('budgetForm');
  if (!el) return;
  el.innerHTML = CATS.map(c =>
    `<div class="budget-row">
       <div class="budget-icon" style="background:${c.bg}">${c.icon}</div>
       <div class="budget-name">${c.name}</div>
       <div class="budget-input-wrap">
         <span class="budget-currency">NT$</span>
         <input type="number" class="budget-input" id="b_${c.id}"
                value="${budgets[c.id] || 0}" min="0"
                oninput="updateBudgetTotal()">
       </div>
     </div>`
  ).join('');
  updateBudgetTotal();
}

function updateBudgetTotal() {
  let total = 0;
  CATS.forEach(c => {
    const el = document.getElementById('b_' + c.id);
    if (el) total += Math.max(0, Number(el.value) || 0);
  });
  const el = document.getElementById('budgetTotal');
  if (el) {
    el.textContent = fmt(total);
    el.className = 'budget-total-value';
    el.title = '';
  }
}

function renderExpenseList(expenses) {
  const el = document.getElementById('expenseList');
  if (!el) return;

  const info = document.getElementById('historyInfo');
  if (info) {
    const total = expenses.reduce((a, e) => a + e.amount, 0);
    info.textContent = expenses.length > 0 ? `共 ${expenses.length} 筆・${fmt(total)}` : '';
  }

  const sorted = [...expenses].sort((a, b) => new Date(b.date) - new Date(a.date));
  if (sorted.length === 0) {
    el.innerHTML = `<div class="empty-state"><span class="empty-icon">🧾</span><div class="empty-text">本月尚無支出紀錄</div></div>`;
  } else {
    el.innerHTML = sorted.map(e => {
      const c = catById(e.cat);
      return `<div class="exp-item">
        <span class="exp-badge" style="background:${c.bg};color:${c.text}">${c.icon} ${c.name}</span>
        <span class="exp-desc" title="${e.desc || ''}">${e.desc || '—'}</span>
        <span class="exp-date">${e.date}</span>
        <span class="exp-amt">${fmt(e.amount)}</span>
        <span class="exp-del">
          <button class="btn-sm btn-danger" onclick="deleteExpense('${e.id}')" aria-label="刪除">✕</button>
        </span>
      </div>`;
    }).join('');
  }
}

/* ═══════════════════════════════════════
   Actions
═══════════════════════════════════════ */
function addExpense() {
  const cat  = document.getElementById('expCat').value;
  const desc = document.getElementById('expDesc').value.trim();
  const amt  = Number(document.getElementById('expAmt').value);
  const date = document.getElementById('expDate').value;
  if (!amt || amt <= 0) { toast('請輸入有效金額', 'error'); return; }
  if (!date)            { toast('請選擇日期', 'error');     return; }
  const d  = new Date(date);
  const ey = d.getFullYear(), em = d.getMonth();
  const expenses = getExpenses(ey, em);
  expenses.push({ id: Date.now().toString(), cat, desc, amount: Math.round(amt), date });
  setExpenses(ey, em, expenses);
  document.getElementById('expDesc').value = '';
  document.getElementById('expAmt').value  = '';
  currentYear = ey; currentMonth = em;
  renderAll();
  toast('✓ 已新增：' + (desc || catById(cat).name) + ' ' + fmt(Math.round(amt)));
}

function deleteExpense(id) {
  const arr = getExpenses(currentYear, currentMonth).filter(e => e.id !== id);
  setExpenses(currentYear, currentMonth, arr);
  renderAll();
}

function clearMonth() {
  if (!confirm(`確定要清除 ${currentYear}年${currentMonth + 1}月 所有支出紀錄？\n此操作無法復原。`)) return;
  setExpenses(currentYear, currentMonth, []);
  renderAll();
  toast('已清除本月紀錄');
}

function saveBudgets() {
  const b = {};
  let total = 0;
  CATS.forEach(c => {
    const el = document.getElementById('b_' + c.id);
    const v = el ? Math.max(0, Number(el.value) || 0) : 0;
    b[c.id] = v;
    total += v;
  });
  save('bgt_budgets', b);
  renderAll();
  toast('✓ 預算設定已儲存');
}

/* ═══════════════════════════════════════
   Excel 匯出
═══════════════════════════════════════ */
function exportExcel() {
  const expenses = getExpenses(currentYear, currentMonth);
  const budgets  = getBudgets();
  const totals   = getTotals(expenses);
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  // Sheet 1: 支出明細
  const sorted = [...expenses].sort((a, b) => new Date(a.date) - new Date(b.date));
  const expRows = [['日期', '類別', '描述', '金額 (NT$)']];
  sorted.forEach(e => {
    expRows.push([e.date, catById(e.cat).name, e.desc || '', e.amount]);
  });
  expRows.push([]);
  expRows.push(['', '', '合計', expenses.reduce((a, e) => a + e.amount, 0)]);

  // Sheet 2: 類別摘要
  const summaryRows = [['類別', '預算 (NT$)', '實際支出 (NT$)', '使用率 (%)', '剩餘 (NT$)']];
  CATS.forEach(c => {
    const spent  = totals[c.id] || 0;
    const budget = budgets[c.id] || 0;
    const pct    = budget > 0 ? Math.round(spent / budget * 100) : 0;
    summaryRows.push([c.name, budget, spent, pct, budget - spent]);
  });
  const totalBudget = Object.values(budgets).reduce((a, b) => a + b, 0);
  const totalSpent  = Object.values(totals).reduce((a, b) => a + b, 0);
  summaryRows.push(['合計', totalBudget, totalSpent,
    totalBudget > 0 ? Math.round(totalSpent / totalBudget * 100) : 0,
    totalBudget - totalSpent]);

  const wb  = XLSX.utils.book_new();
  const ws1 = XLSX.utils.aoa_to_sheet(expRows);
  const ws2 = XLSX.utils.aoa_to_sheet(summaryRows);

  // 欄寬
  ws1['!cols'] = [{ wch: 12 }, { wch: 8 }, { wch: 20 }, { wch: 12 }];
  ws2['!cols'] = [{ wch: 10 }, { wch: 12 }, { wch: 14 }, { wch: 10 }, { wch: 12 }];

  XLSX.utils.book_append_sheet(wb, ws1, '支出明細');
  XLSX.utils.book_append_sheet(wb, ws2, '類別摘要');

  const filename = `預算追蹤_${currentYear}年${MONTHS[currentMonth]}.xlsx`;
  XLSX.writeFile(wb, filename);
  toast(`✓ 已匯出 ${filename}`);
}

/* ═══════════════════════════════════════
   Excel 匯入
═══════════════════════════════════════ */
function importExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb    = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
      const ws    = wb.Sheets[wb.SheetNames[0]];
      const rows  = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      if (!rows.length) { toast('檔案內容為空', 'error'); return; }

      // 尋找標題列（含「日期」欄位）
      let startRow = 0;
      for (let i = 0; i < Math.min(rows.length, 5); i++) {
        if (String(rows[i][0]).includes('日期')) { startRow = i + 1; break; }
      }

      const catNameMap = {};
      CATS.forEach(c => { catNameMap[c.name] = c.id; });

      let added = 0, skipped = 0;
      const newExpenses = { ...getAllExpenses() };

      for (let i = startRow; i < rows.length; i++) {
        const row = rows[i];
        if (!row[0] || !row[3]) continue; // 無日期或金額略過

        // 解析日期
        let dateStr = '';
        if (row[0] instanceof Date) {
          dateStr = row[0].toISOString().split('T')[0];
        } else {
          const parsed = new Date(row[0]);
          if (!isNaN(parsed)) {
            dateStr = parsed.toISOString().split('T')[0];
          } else {
            // 嘗試 YYYY/MM/DD 或 YYYY-MM-DD
            const m = String(row[0]).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
            if (m) dateStr = `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
          }
        }
        if (!dateStr) { skipped++; continue; }

        const amt = Number(row[3]);
        if (!amt || isNaN(amt) || amt <= 0) { skipped++; continue; }

        const catName = String(row[1] || '');
        const catId   = catNameMap[catName] || 'other';
        const desc    = String(row[2] || '').trim();

        const d  = new Date(dateStr);
        const ey = d.getFullYear(), em = d.getMonth();
        const key = monthKey(ey, em);
        if (!newExpenses[key]) newExpenses[key] = [];
        newExpenses[key].push({ id: Date.now().toString() + '_' + i, cat: catId, desc, amount: Math.round(amt), date: dateStr });
        added++;
      }

      // 存回 localStorage
      Object.entries(newExpenses).forEach(([k, arr]) => {
        save('bgt_exp_' + k, arr);
      });

      renderAll();
      toast(`✓ 匯入完成：新增 ${added} 筆${skipped > 0 ? `，略過 ${skipped} 筆` : ''}`, 'success');
    } catch (err) {
      console.error(err);
      toast('匯入失敗：' + err.message, 'error');
    }
    event.target.value = ''; // reset file input
  };
  reader.readAsBinaryString(file);
}

function getAllExpenses() {
  const all = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('bgt_exp_')) {
      const mk = k.replace('bgt_exp_', '');
      try { all[mk] = JSON.parse(localStorage.getItem(k)); } catch {}
    }
  }
  return all;
}

/* ═══════════════════════════════════════
   Firebase 離線優先同步
═══════════════════════════════════════ */
let fbApp = null, fbDb = null;

function fbLoadConfig() {
  const cfg = load('bgt_fb_config') || {};
  if (cfg.apiKey)  document.getElementById('fbApiKey').value = cfg.apiKey;
  if (cfg.dbUrl)   document.getElementById('fbDbUrl').value  = cfg.dbUrl;
  if (cfg.path)    document.getElementById('fbPath').value   = cfg.path;
  if (cfg.lastSync) document.getElementById('fbLastSync').textContent = '上次：' + cfg.lastSync;
  if (cfg.apiKey && cfg.dbUrl) fbInitSdk(cfg);
}

function fbSetStatus(state, msg, time) {
  const dot   = document.getElementById('fbDot');
  const text  = document.getElementById('fbStatusText');
  const tsEl  = document.getElementById('fbLastSync');
  dot.className = 'status-dot ' + (state || '');
  text.textContent = msg;
  if (time) tsEl.textContent = '上次：' + time;
  const pullBtn = document.getElementById('btnPull');
  const pushBtn = document.getElementById('btnPush');
  const ready   = state === 'connected';
  pullBtn.disabled = !ready;
  pushBtn.disabled = !ready;
}

function fbConnect() {
  const apiKey = document.getElementById('fbApiKey').value.trim();
  const dbUrl  = document.getElementById('fbDbUrl').value.trim();
  const path   = document.getElementById('fbPath').value.trim() || 'budget-tracker';

  if (!apiKey || !dbUrl) { toast('請填寫 API Key 與 Database URL', 'error'); return; }
  if (!dbUrl.startsWith('https://')) { toast('Database URL 格式錯誤，應以 https:// 開頭', 'error'); return; }

  const cfg = { apiKey, dbUrl, path };
  save('bgt_fb_config', cfg);
  fbInitSdk(cfg);
}

function fbInitSdk(cfg) {
  try {
    if (fbApp) {
      try { fbApp.delete(); } catch {}
    }
    fbApp = firebase.initializeApp({
      apiKey: cfg.apiKey,
      databaseURL: cfg.dbUrl,
    }, 'budget-app-' + Date.now());
    fbDb = firebase.database(fbApp);
    fbSetStatus('connected', '✓ 已連線，等待操作', load('bgt_fb_config')?.lastSync || '');
    toast('✓ Firebase 連線成功');
  } catch (err) {
    fbSetStatus('error', '連線失敗：' + err.message);
    toast('Firebase 連線失敗：' + err.message, 'error');
  }
}

function fbGetPath() {
  return (load('bgt_fb_config') || {}).path || 'budget-tracker';
}

async function fbPull() {
  if (!fbDb) { toast('請先設定並連線 Firebase', 'error'); return; }
  fbSetStatus('syncing', '正在拉取資料…');
  try {
    const snap = await fbDb.ref(fbGetPath()).get();
    if (!snap.exists()) {
      fbSetStatus('connected', '✓ 雲端目前無資料');
      toast('雲端尚無資料，如需共用請先推送', 'info');
      return;
    }
    const data = snap.val();
    let count = 0;
    if (data.expenses) {
      Object.entries(data.expenses).forEach(([mk, arr]) => {
        if (Array.isArray(arr) && arr.length > 0) {
          // 合併：以 id 去重
          const existing = load('bgt_exp_' + mk) || [];
          const existIds = new Set(existing.map(e => e.id));
          const merged   = [...existing, ...arr.filter(e => !existIds.has(e.id))];
          save('bgt_exp_' + mk, merged);
          count += arr.filter(e => !existIds.has(e.id)).length;
        }
      });
    }
    if (data.budgets) {
      save('bgt_budgets', data.budgets);
    }
    const ts = new Date().toLocaleString('zh-TW');
    const cfg = load('bgt_fb_config') || {};
    save('bgt_fb_config', { ...cfg, lastSync: ts });
    fbSetStatus('connected', '✓ 拉取完成', ts);
    renderAll();
    toast(`✓ 拉取完成，合併 ${count} 筆新資料`);
  } catch (err) {
    fbSetStatus('error', '拉取失敗：' + err.message);
    toast('拉取失敗：' + err.message, 'error');
  }
}

async function fbPush() {
  if (!fbDb) { toast('請先設定並連線 Firebase', 'error'); return; }
  fbSetStatus('syncing', '正在推送資料…');
  try {
    const allExp = getAllExpenses();
    const budgets = getBudgets();
    await fbDb.ref(fbGetPath()).set({ expenses: allExp, budgets, pushedAt: new Date().toISOString() });
    const ts = new Date().toLocaleString('zh-TW');
    const cfg = load('bgt_fb_config') || {};
    save('bgt_fb_config', { ...cfg, lastSync: ts });
    fbSetStatus('connected', '✓ 推送完成', ts);
    toast('✓ 資料已推送至 Firebase');
  } catch (err) {
    fbSetStatus('error', '推送失敗：' + err.message);
    toast('推送失敗：' + err.message, 'error');
  }
}

/* ═══════════════════════════════════════
   Enter key shortcut for add expense
═══════════════════════════════════════ */
['expDesc', 'expAmt'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') addExpense();
  });
});

   Init
═══════════════════════════════════════ */
document.getElementById('expDate').value = new Date().toISOString().split('T')[0];
fbLoadConfig();
renderAll();
</script>
